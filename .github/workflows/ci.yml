name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: "default"
            cargo_flags: ""
          - features: "tokio"
            cargo_flags: "--features graph-engine/tokio"
          - features: "storage"
            cargo_flags: "--features graph-engine/storage"
          - features: "tokio+storage"
            cargo_flags: "--features graph-engine/tokio --features graph-engine/storage"
          - features: "all"
            cargo_flags: "--all-features"
          - features: "no-default"
            cargo_flags: "--no-default-features"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.features }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.features }}-

      - name: Build
        run: cargo build ${{ matrix.cargo_flags }} --workspace

      - name: Test
        run: cargo test ${{ matrix.cargo_flags }} --workspace

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (default features)
        run: cargo clippy --workspace -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings
