[workspace]
members = [
    "crates/graph-core",
    "crates/graph-world",
    "crates/graph-engine",
    "crates/graph-tx",
    "crates/graph-testkit",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
graph-core = { path = "crates/graph-core" }
graph-world = { path = "crates/graph-world" }
graph-engine = { path = "crates/graph-engine" }
graph-tx = { path = "crates/graph-tx" }
graph-testkit = { path = "crates/graph-testkit" }
criterion = "0.5.1"
rustc-hash = "2.1.1"
rayon = "1.10.0"
smallvec = "1.13.2"
